<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iOS-like Custom Keyboard Overlay</title>
  <style>
    :root{
      /* iOS-ish palette (approx) */
      --ios-bg: #d1d4da;       /* keyboard well */
      --ios-key: #ffffff;      /* key */
      --ios-func: #b9bdc6;     /* shift/delete/123 */
      --ios-keytext: #111114;
      --ios-functext: #111114;
      --ios-border: rgba(0,0,0,.12);

      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeTop: env(safe-area-inset-top, 0px);

      /* portrait baseline (approx px) */
      --kbW: 320px;
      --kbH: 216px;

      --keyH: 44px;            /* visual height */
      --keyR: 6px;

      --gap: 7.5px;
      --padTop: 7.5px;
      --padBottom: 2px;

      --row2Inset: 11.3px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    /* Use dynamic viewport height on iOS to prevent bottom cut-off */
    @supports (height: 100dvh){
      html, body { height: 100dvh; }
    }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:#0b0b0f;
      color:#f6f7ff;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow:hidden;
    }

    /* mobile-only guard */
    .desktop-guard{ display:none; padding:24px; text-align:center; color:#c7c9d6; }
    @media (min-width: 768px){
      .app{ display:none !important; }
      .desktop-guard{ display:block; }
    }

    .app{
      position:relative;
      height:100%;
      padding: calc(14px + var(--safeTop)) 16px 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      max-width:560px;
      margin:0 auto;
    }

    .card{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 12px;
    }

    .label{ font-size:12px; color: rgba(246,247,255,.7); margin-bottom:8px; }

    /* simulated input */
    .display{
      position:relative;
      min-height: 46px;
      padding: 12px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      gap:10px;
      user-select:none;
      -webkit-user-select:none;
    }
    .display:active{ filter: brightness(1.05); }

    /* caret on LEFT side (before text) */
    .caret{
      width:2px;
      height:18px;
      background: rgba(255,255,255,.92);
      border-radius:2px;
      flex:0 0 auto;
      animation: blink 1.05s step-end infinite;
    }
    @keyframes blink { 50% { opacity:0; } }

    .text{
      font-size:16px;
      line-height:1.2;
      white-space:pre-wrap;
      word-break:break-word;
      flex:1 1 auto;
      color:#f6f7ff;
    }
    .placeholder{ color: rgba(246,247,255,.45); }

    .note{ font-size:12px; color: rgba(246,247,255,.65); line-height:1.3; margin-top:8px; }

    /* output */
    .output .display{
      background: rgba(20, 198, 120, .10);
      border-color: rgba(20, 198, 120, .22);
    }

    /* overlay keyboard */
    .kb-overlay{
      position:fixed;
      inset:0;
      height:100%;
      background: rgba(0,0,0,.0);
      pointer-events:none;
      z-index:999;
    }
    @supports (height: 100dvh){
      .kb-overlay{ height: 100dvh; }
    }

    .kb-overlay.show{
      pointer-events:auto;
      background: rgba(0,0,0,.10);
      transition: background 180ms ease;
    }

    .keyboard{
      position:absolute;
      left:50%;
      width: min(var(--kbW), 100vw);

      /* Key fix: clamp to visible viewport so it never gets cut off */
      height: min(var(--kbH), calc(100dvh - 16px - var(--safeTop)));
      min-height: 162px;

      transform: translate(-50%, 100%);
      bottom: 0;
      background: var(--ios-bg);
      border-top: 1px solid rgba(0,0,0,.12);
      box-shadow: 0 -10px 30px rgba(0,0,0,.25);
      padding: var(--padTop) var(--gap) calc(var(--padBottom) + var(--safeBottom));
      display:flex;
      flex-direction:column;
      gap: var(--gap);
      will-change: transform;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      overflow:hidden;
    }
    .kb-overlay.show .keyboard{
      transform: translate(-50%, 0);
      transition: transform 260ms cubic-bezier(.2,.85,.25,1);
    }
    .kb-overlay.hiding .keyboard{
      transform: translate(-50%, 100%);
      transition: transform 220ms cubic-bezier(.4,0,.6,1);
    }

    .row{
      display:flex;
      gap: var(--gap);
      align-items:stretch;
    }
    .row.row2{ padding: 0 calc(var(--row2Inset) - var(--gap)); }
    .row.row3{ padding: 0 0; }

    .key{
      height: var(--keyH);
      border-radius: var(--keyR);
      border: 1px solid var(--ios-border);
      box-shadow: 0 1px 0 rgba(0,0,0,.14), 0 1px 0 rgba(255,255,255,.55) inset;
      background: var(--ios-key);
      color: var(--ios-keytext);
      font-size: 17px;
      font-weight: 600;
      display:flex;
      align-items:center;
      justify-content:center;
      flex: 1 1 0;
      padding: 0 6px;
      user-select:none;
      -webkit-user-select:none;
      touch-action: manipulation;
    }
    .key:active{
      transform: translateY(1px);
      filter: brightness(.96);
    }

    .key.func{
      background: var(--ios-func);
      color: var(--ios-functext);
      font-weight: 650;
      font-size: 14px;
    }

    .key.go{
      background: #ffffff;
      font-weight: 750;
    }

    .key.space{
      flex: 4.6 1 0;
      font-weight: 550;
      font-size: 15px;
    }

    /* approximate special widths */
    .key.shift, .key.del, .key.num, .key.globe{
      flex: 1.35 1 0;
    }
    .key.period{ flex: 1.1 1 0; }

    .key.disabled{
      opacity:.55;
    }
    .key.disabled:active{
      transform:none;
      filter:none;
    }

    /* done bar mimic */
    .grabber{
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0,0,0,.20);
      margin: 2px auto 4px;
      flex: 0 0 auto;
    }

    /* Icon styling for function keys */
    .key.func svg{
      width: 18px;
      height: 18px;
      display:block;
      color: var(--ios-functext);
    }
    .key.shift svg path{
      fill: currentColor;
    }

    .key.shift.is-on{
      box-shadow: 0 1px 0 rgba(0,0,0,.14),
                  0 1px 0 rgba(255,255,255,.55) inset,
                  0 0 0 2px rgba(255,255,255,.35);
      filter: brightness(1.02);
    }

    /* reduce motion */
    @media (prefers-reduced-motion: reduce){
      .kb-overlay.show .keyboard,
      .kb-overlay.hiding .keyboard{ transition:none !important; }
      .caret{ animation:none; }
    }
  </style>
</head>
<body>
  <div class="desktop-guard">
    <h2 style="margin:0 0 8px; font-size:18px; color:#fff;">Mobile only</h2>
    <p style="margin:0;">Open this page on a phone-sized viewport.</p>
  </div>

  <main class="app">
    <section class="card">
      <div class="label">Simulated input (tap to open keyboard)</div>
      <div id="inputDisplay" class="display" role="button" aria-label="Simulated input">
        <div class="caret" aria-hidden="true"></div>
        <div id="inputText" class="text placeholder">Tap to type…</div>
      </div>
      <div class="note">Native keyboard is prevented by not using a real &lt;input&gt;.</div>
    </section>

    <section class="card output">
      <div class="label">Output after Go</div>
      <div class="display" role="status" aria-live="polite">
        <div id="outputText" class="text placeholder">Nothing yet.</div>
      </div>
      <div class="note">Tap outside the keyboard to dismiss it.</div>
    </section>
  </main>

  <!-- overlay keyboard -->
  <div id="overlay" class="kb-overlay" aria-hidden="true">
    <div class="keyboard" role="application" aria-label="Custom keyboard">
      <div class="grabber" aria-hidden="true"></div>

      <!-- row 1 -->
      <div class="row row1">
        <button class="key" data-k="q" type="button">Q</button>
        <button class="key" data-k="w" type="button">W</button>
        <button class="key" data-k="e" type="button">E</button>
        <button class="key" data-k="r" type="button">R</button>
        <button class="key" data-k="t" type="button">T</button>
        <button class="key" data-k="y" type="button">Y</button>
        <button class="key" data-k="u" type="button">U</button>
        <button class="key" data-k="i" type="button">I</button>
        <button class="key" data-k="o" type="button">O</button>
        <button class="key" data-k="p" type="button">P</button>
      </div>

      <!-- row 2 -->
      <div class="row row2">
        <button class="key" data-k="a" type="button">A</button>
        <button class="key" data-k="s" type="button">S</button>
        <button class="key" data-k="d" type="button">D</button>
        <button class="key" data-k="f" type="button">F</button>
        <button class="key" data-k="g" type="button">G</button>
        <button class="key" data-k="h" type="button">H</button>
        <button class="key" data-k="j" type="button">J</button>
        <button class="key" data-k="k" type="button">K</button>
        <button class="key" data-k="l" type="button">L</button>
      </div>

      <!-- row 3 -->
      <div class="row row3">
        <button id="shiftKey" class="key func shift" data-action="shift" type="button" aria-pressed="false" aria-label="Shift">
          <!-- iOS-like shift icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3l7 7h-4v7H9v-7H5l7-7z"></path>
          </svg>
        </button>

        <button class="key" data-k="z" type="button">Z</button>
        <button class="key" data-k="x" type="button">X</button>
        <button class="key" data-k="c" type="button">C</button>
        <button class="key" data-k="v" type="button">V</button>
        <button class="key" data-k="b" type="button">B</button>
        <button class="key" data-k="n" type="button">N</button>
        <button class="key" data-k="m" type="button">M</button>

        <button class="key func del" data-action="backspace" type="button" aria-label="Delete">
          <!-- backspace icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M21 7v10a2 2 0 0 1-2 2H9a2 2 0 0 1-1.4-.6L3 13l4.6-5.4A2 2 0 0 1 9 7h10a2 2 0 0 1 2 0z"></path>
            <path d="M11 10l7 7M18 10l-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
      </div>

      <!-- row 4 -->
      <div class="row row4">
        <button class="key func num disabled" data-action="numbers" type="button" aria-disabled="true">123</button>
        <button class="key func globe disabled" data-action="emoji" type="button" aria-disabled="true">😊</button>
        <button class="key space" data-action="space" type="button">space</button>
        <button class="key period" data-k="." type="button">.</button>
        <button class="key go" data-action="go" type="button">return</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const overlay = document.getElementById('overlay');
      const inputDisplay = document.getElementById('inputDisplay');
      const inputTextEl = document.getElementById('inputText');
      const outputTextEl = document.getElementById('outputText');
      const shiftKey = document.getElementById('shiftKey');

      let value = '';
      let shift = true; // single-shot shift to start

      const setVarsForViewport = () => {
        // Keep keyboard centered and roughly iPhone portrait sized, but responsive.
        const w = Math.min(window.innerWidth, 568);
        const isLandscape = window.innerWidth > window.innerHeight;

        document.documentElement.style.setProperty('--kbW', Math.min(w, window.innerWidth) + 'px');
        document.documentElement.style.setProperty('--kbH', (isLandscape ? 162 : 216) + 'px');
      };

      const render = () => {
        if (value.length) {
          inputTextEl.textContent = value;
          inputTextEl.classList.remove('placeholder');
        } else {
          inputTextEl.textContent = 'Tap to type…';
          inputTextEl.classList.add('placeholder');
        }

        shiftKey.setAttribute('aria-pressed', String(shift));
        shiftKey.classList.toggle('is-on', shift);
      };

      const openKb = () => {
        overlay.classList.remove('hiding');
        overlay.classList.add('show');
        overlay.setAttribute('aria-hidden', 'false');
      };

      const closeKb = () => {
        if (!overlay.classList.contains('show')) return;
        overlay.classList.add('hiding');
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden', 'true');
      };

      overlay.addEventListener('transitionend', (e) => {
        if (e.target.classList && e.target.classList.contains('keyboard')) {
          overlay.classList.remove('hiding');
        }
      });

      const pushChar = (ch) => {
        if (!ch) return;
        value += ch;
        if (shift && /[A-Z]/.test(ch)) shift = false; // single-shot shift
        render();
      };

      const backspace = () => {
        if (!value) return;
        value = value.slice(0, -1);
        render();
      };

      const go = () => {
        if (value.length) {
          outputTextEl.textContent = value;
          outputTextEl.classList.remove('placeholder');
        } else {
          outputTextEl.textContent = 'Nothing yet.';
          outputTextEl.classList.add('placeholder');
        }
      };

      // Tap input opens keyboard
      inputDisplay.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        openKb();
      });

      // Tap outside keyboard closes it
      overlay.addEventListener('pointerdown', (e) => {
        if (e.target === overlay) closeKb();
      });

      // Keyboard click delegation
      overlay.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn || btn.classList.contains('disabled')) return;

        const action = btn.dataset.action;
        const k = btn.dataset.k;

        if (action) {
          switch (action) {
            case 'shift':
              shift = !shift;
              render();
              return;
            case 'backspace':
              backspace();
              return;
            case 'space':
              pushChar(' ');
              return;
            case 'go':
              go();
              // closeKb(); // optionally dismiss
              return;
            default:
              return;
          }
        }

        if (k) {
          const isLetter = /^[a-z]$/i.test(k);
          const ch = isLetter ? (shift ? k.toUpperCase() : k.toLowerCase()) : k;
          pushChar(ch);
        }
      }, { passive: true });

      // Basic HW keyboard testing
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeKb();
        if (!overlay.classList.contains('show')) return;

        if (e.metaKey || e.ctrlKey || e.altKey) return;

        if (e.key === 'Backspace') { e.preventDefault(); backspace(); return; }
        if (e.key === 'Enter') { e.preventDefault(); go(); return; }
        if (e.key === 'Shift') { shift = true; render(); return; }

        if (e.key.length === 1) {
          const raw = e.key;
          if (/^[a-zA-Z .]$/.test(raw)) {
            e.preventDefault();
            const isLetter = /^[a-zA-Z]$/.test(raw);
            const ch = isLetter ? (shift ? raw.toUpperCase() : raw.toLowerCase()) : raw;
            pushChar(ch);
          }
        }
      }, { passive: false });

      window.addEventListener('resize', setVarsForViewport, { passive: true });
      window.addEventListener('orientationchange', setVarsForViewport, { passive: true });

      setVarsForViewport();
      render();
    })();
  </script>
</body>
</html>
